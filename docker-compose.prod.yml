services:
  # PHP-FPM application
  app:
    image: php:8.4-fpm-alpine
    container_name: rabetxrpflow_app
    restart: unless-stopped
    working_dir: /var/www/html
    user: "1000:1000"
    volumes:
      - ./src:/var/www/html:ro
      - ./src/vendor:/var/www/html/vendor
      - ./src/storage:/var/www/html/storage
      - ./src/bootstrap/cache:/var/www/html/bootstrap/cache
      - ./docker/php/conf.d/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      - mysql
      - redis

  # Nginx with HTTPS
  nginx:
    image: nginx:alpine
    container_name: rabetxrpflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html:ro
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/rabetxrpflow.com/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/rabetxrpflow.com/privkey.pem:/etc/ssl/private/privkey.pem:ro
    depends_on:
      - app

  # MySQL
  mysql:
    image: mariadb:10.6
    container_name: rabetxrpflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "laravel", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:alpine
    container_name: rabetxrpflow_redis
    restart: unless-stopped

volumes:
  db_data: